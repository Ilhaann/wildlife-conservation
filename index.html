<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Save Our Wildlife</h1>
        
        <div class="video-wrapper" id="videoContainer">
            <video id="wildlifeVideo" controls aria-label="Promotional video about wildlife conservation">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the HTML5 video tag.
            </video>
        </div>
        
        <p class="description">Join us in our mission to protect and preserve endangered species across the globe. Every action counts, and together, we can make a lasting difference.</p>
        
        <button id="actionBtn" aria-controls="wildlifeVideo">Play Video</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
